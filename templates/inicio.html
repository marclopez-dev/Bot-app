<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<style>
body {
    width: 90vw;
    max-width: 400px;
    height: 60vh;
    overflow-y: auto;
}
button {
    background-color: red;
    color: white;
    padding: 20px;
    border-radius: 240px;
    border: none;
    height: 30px;
    text-align: center;
    margin-bottom: 20px;
}
p {
    margin: 0;
    height: 100vh;
    animation: textoAnimado 5s infinite;
    text-align: center;
    font-size: 30px;
}
@keyframes textoAnimado {
    0% {color: red;}
    25% {color: blue;}
    75% {color: purple;}
    100% {color: red;}
}
h1 {
    text-align: center;
    font-size: 23px;
}
#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #121212;
    z-index: -1;
}
.contenedor {
    width: 100%;
}
</style>
</head>
<body>
<p>La cademia Cerebritos Peruanos</p>
<h1>Te da la bienvenida</h1>

<div id="particles-js"></div>
<div class="contenedor">
    <button onclick="Pag1()">Continuar</button>
    <button onclick="pag1()">Click</button>
</div>

<script>
function Pag1() {
    let y = confirm("Desea continuar");
    if (y == true) {
        window.location.href = "/registro";
    } else {
        Swal.fire({
            title: "Algo falló",
            text: "Asegurese de precionar en ACEPTAR",
            icon: "info"
        });
    }
}

particlesJS("particles-js", {
    particles: {
        number: { value: 100 },
        size: { value: 4 },
        move: { speed: 2.5 }
    }
});

function pag1() {
    Swal.fire({
        title: "Todo está iniciando",
        text: "espera unos minutos...",
        icon: "success",
        confirmButtonText: "continuar"
    });
}
</script>
</body>
</html>
